services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-mu2etalks}
      POSTGRES_USER:     ${POSTGRES_USER:-mu2etalks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mu2etalks}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: mu2e_talks.settings.prod
      DATABASE_URL: postgres://${POSTGRES_USER:-mu2etalks}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mu2etalks}
      CSRF_TRUSTED_ORIGINS: https://${MU2E_HOSTNAME:-localhost}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      MU2E_HOSTNAME: ${MU2E_HOSTNAME:-localhost}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - staticfiles:/srv/static:ro
      - media:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy

volumes:
  pgdata:
  staticfiles:
  media:
  caddy_data:
  caddy_config:

{{- if and .Values.certManager.enabled .Values.certManager.externalCertificate }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: router-read-tls-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mu2e-talks-simple.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.certManager.secretName | quote }}]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: router-read-tls-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mu2e-talks-simple.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: router
    namespace: openshift-ingress
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: router-read-tls-secret
{{- end }}

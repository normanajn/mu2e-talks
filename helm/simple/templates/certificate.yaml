{{- if and .Values.route.hostname .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mu2e-talks-simple.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.certManager.secretName }}
  issuerRef:
    name: {{ .Values.certManager.clusterIssuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.route.hostname }}
{{- end }}

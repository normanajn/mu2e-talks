{% extends "base.html" %}
{% block title %}Report a Bug — Mu2eTalks{% endblock %}

{% block content %}
<div class="max-w-2xl space-y-6">

  <h1 class="text-2xl font-bold text-slate-900">Report a Bug</h1>

  <div class="bg-white rounded-lg border border-slate-200 shadow-sm p-6">
    <p class="text-sm text-slate-500 mb-5">
      Describe the problem below. A GitHub issue will be opened automatically.
    </p>

    <form method="post" action="{% url 'bug-report-submit' %}" class="space-y-4">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
          Title <span class="text-red-500">*</span>
        </label>
        <input type="text" name="title" required maxlength="200"
               placeholder="Short summary of the problem"
               class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm
                      focus:border-scd-primary focus:ring-1 focus:ring-scd-primary focus:outline-none">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
          Description <span class="text-red-500">*</span>
        </label>
        <textarea name="body" required rows="7"
                  placeholder="Steps to reproduce, what you expected, what happened instead…"
                  class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm
                         focus:border-scd-primary focus:ring-1 focus:ring-scd-primary focus:outline-none"></textarea>
      </div>

      <div class="flex items-center gap-4 pt-1">
        <button type="submit"
                class="bg-scd-primary hover:bg-scd-primary-hover text-white text-sm font-medium px-4 py-2 rounded-md transition-colors">
          Submit bug report
        </button>
        <a href="{% url 'about' %}" class="text-sm text-slate-400 hover:text-slate-600">Cancel</a>
      </div>
    </form>
  </div>

</div>
{% endblock %}

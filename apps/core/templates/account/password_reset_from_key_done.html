{% extends "base.html" %}
{% block title %}Password Updated — Mu2eTalks{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8 text-center">
      <div class="text-4xl mb-4">✅</div>
      <h1 class="text-2xl font-bold text-slate-900 mb-2">Password updated</h1>
      <p class="text-sm text-slate-500">Your password has been changed successfully.</p>
      <a href="{% url 'account_login' %}"
         class="inline-block mt-6 bg-scd-primary hover:bg-scd-primary-hover text-white font-medium py-2 px-6 rounded-md text-sm transition-colors">
        Sign in
      </a>
    </div>
  </div>
</div>
{% endblock %}

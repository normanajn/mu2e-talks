{% extends "base.html" %}
{% block title %}Check Your Email — Mu2eTalks{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8 text-center">
      <div class="text-4xl mb-4">📬</div>
      <h1 class="text-2xl font-bold text-slate-900 mb-2">Check your email</h1>
      <p class="text-sm text-slate-500">
        If that address is registered, you'll receive a password reset link shortly.
      </p>
      <a href="{% url 'account_login' %}"
         class="inline-block mt-6 text-sm text-scd-primary hover:underline">
        Back to sign in
      </a>
    </div>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Sign Out — Mu2eTalks{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8 text-center">
      <h1 class="text-xl font-bold text-slate-900 mb-2">Sign out?</h1>
      <p class="text-sm text-slate-500 mb-6">You will be signed out of Mu2eTalks.</p>
      <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        <button type="submit"
                class="bg-scd-primary hover:bg-scd-primary-hover text-white font-medium py-2 px-6 rounded-md text-sm transition-colors">
          Sign out
        </button>
      </form>
      <a href="/" class="block mt-3 text-sm text-slate-500 hover:underline">Cancel</a>
    </div>
  </div>
</div>
{% endblock %}

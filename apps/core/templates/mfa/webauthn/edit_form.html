{% extends "base.html" %}
{% block title %}Rename Passkey — Mu2eTalks{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
      <h1 class="text-xl font-bold text-slate-900 mb-6">Rename passkey</h1>

      <form method="post" action="{% url 'mfa_edit_webauthn' pk=object.pk %}">
        {% csrf_token %}
        <div class="mb-5">
          <label for="{{ form.name.id_for_label }}"
                 class="block text-sm font-medium text-slate-700 mb-1">Name</label>
          <input type="text"
                 name="{{ form.name.html_name }}"
                 id="{{ form.name.id_for_label }}"
                 value="{{ form.name.value|default:'' }}"
                 class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-scd-primary focus:border-transparent"
                 autofocus>
          {% if form.name.errors %}
          <p class="mt-1 text-xs text-red-600">{{ form.name.errors|join:", " }}</p>
          {% endif %}
        </div>
        <div class="flex gap-3">
          <button type="submit"
                  class="bg-scd-primary hover:bg-scd-primary-hover text-white text-sm font-medium px-4 py-2 rounded-md transition-colors">
            Save
          </button>
          <a href="{% url 'mfa_list_webauthn' %}"
             class="text-sm text-slate-500 hover:text-slate-700 self-center">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% if error %}
<div class="bg-red-50 border border-red-200 rounded-lg px-6 py-5 mt-4">
  <p class="text-sm font-semibold text-red-700 mb-1">AI query failed</p>
  <p class="text-sm text-red-600">{{ error }}</p>
</div>
{% else %}
<div class="bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden mt-4">
  <div class="px-6 py-3 bg-slate-50 border-b border-slate-200 flex items-center justify-between flex-wrap gap-3">
    <div>
      <p class="text-sm font-semibold text-slate-700">
        AI Response
        <span class="ml-2 text-xs font-normal text-slate-400">{{ count }} talk{{ count|pluralize }}</span>
      </p>
      {% if query %}
      <p class="text-xs text-slate-400 mt-0.5 truncate max-w-lg" title="{{ query }}">Query: {{ query }}</p>
      {% endif %}
    </div>
    <div class="flex gap-2">
      <form method="post" action="{% url 'reports:summary-download-md' %}">
        {% csrf_token %}
        <textarea name="summary_text" class="hidden">{{ summary_text }}</textarea>
        <button type="submit"
                class="text-xs font-medium px-3 py-1.5 rounded border border-slate-300 text-slate-600 hover:bg-slate-50 transition-colors uppercase tracking-wide">
          ↓ MD
        </button>
      </form>
      <form method="post" action="{% url 'reports:summary-download-pdf' %}">
        {% csrf_token %}
        <textarea name="summary_text" class="hidden">{{ summary_text }}</textarea>
        <button type="submit"
                class="text-xs font-medium px-3 py-1.5 rounded border border-slate-300 text-slate-600 hover:bg-slate-50 transition-colors uppercase tracking-wide">
          ↓ PDF
        </button>
      </form>
    </div>
  </div>
  <div class="px-6 py-5 text-sm text-slate-800 leading-relaxed space-y-3
              [&_h1]:text-lg [&_h1]:font-bold [&_h1]:text-slate-900 [&_h1]:mt-4
              [&_h2]:text-base [&_h2]:font-semibold [&_h2]:text-slate-800 [&_h2]:mt-4
              [&_h3]:text-sm [&_h3]:font-semibold [&_h3]:text-slate-700 [&_h3]:mt-3
              [&_ul]:list-disc [&_ul]:pl-5 [&_ul]:space-y-1
              [&_ol]:list-decimal [&_ol]:pl-5 [&_ol]:space-y-1
              [&_table]:w-full [&_table]:border-collapse [&_table]:text-xs
              [&_th]:bg-slate-100 [&_th]:px-3 [&_th]:py-1.5 [&_th]:text-left [&_th]:font-semibold [&_th]:border [&_th]:border-slate-200
              [&_td]:px-3 [&_td]:py-1.5 [&_td]:border [&_td]:border-slate-200
              [&_tr:nth-child(even)_td]:bg-slate-50
              [&_p]:leading-relaxed
              [&_strong]:font-semibold [&_strong]:text-slate-900
              [&_code]:bg-slate-100 [&_code]:px-1 [&_code]:rounded [&_code]:text-xs [&_code]:font-mono">
    {{ summary_html|safe }}
  </div>
</div>
{% endif %}

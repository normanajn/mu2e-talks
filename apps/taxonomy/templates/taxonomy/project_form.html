{% extends "base.html" %}
{% block title %}Edit Project — SCD Reporting{% endblock %}

{% block content %}
<div class="max-w-lg">
  <div class="mb-6">
    <a href="{% url 'taxonomy:projects' %}"
       class="text-sm text-scd-primary hover:underline">← Back to projects</a>
    <h1 class="text-2xl font-bold text-slate-900 mt-2">Edit project</h1>
  </div>

  <div class="bg-white rounded-lg border border-slate-200 shadow-sm px-6 py-5">
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        {% include "components/_form_field.html" %}
      {% endfor %}
      <div class="flex gap-3 mt-2">
        <button type="submit"
                class="bg-scd-primary hover:bg-scd-primary-hover text-white text-sm font-medium px-4 py-2 rounded-md transition-colors">
          Save
        </button>
        <a href="{% url 'taxonomy:projects' %}"
           class="text-sm text-slate-500 hover:underline self-center">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

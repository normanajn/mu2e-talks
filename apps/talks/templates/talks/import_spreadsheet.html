{% extends "base.html" %}
{% block title %}Import Talk Spreadsheet | Mu2eTalks{% endblock %}
{% block content %}
<div class="max-w-2xl">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'talks:list' %}" class="text-sm text-mu2e-primary hover:underline">&larr; Talks</a>
    <h1 class="text-2xl font-semibold text-slate-900">Import Talk Spreadsheet</h1>
  </div>
  <form method="post" enctype="multipart/form-data" class="bg-white border border-slate-200 rounded-lg p-6 space-y-4">
    {% csrf_token %}
    {% for field in form %}
      {% include "components/_form_field.html" %}
    {% endfor %}
    <button class="bg-mu2e-primary hover:bg-mu2e-primary-hover text-white px-4 py-2 rounded-md text-sm font-medium">Upload Talks</button>
  </form>
</div>
{% endblock %}

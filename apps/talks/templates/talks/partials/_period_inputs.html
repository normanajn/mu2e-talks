<div class="mb-4">
  <label for="id_period_start" class="block text-sm font-medium text-slate-700 mb-1">
    Start date <span class="text-red-500">*</span>
  </label>
  <input type="date" name="period_start" id="id_period_start"
         value="{{ period_start }}"
         required
         class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm
                focus:border-scd-primary focus:ring-1 focus:ring-scd-primary focus:outline-none">
</div>
<div class="mb-4">
  <label for="id_period_end" class="block text-sm font-medium text-slate-700 mb-1">
    End date <span class="text-red-500">*</span>
  </label>
  <input type="date" name="period_end" id="id_period_end"
         value="{{ period_end }}"
         required
         class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm
                focus:border-scd-primary focus:ring-1 focus:ring-scd-primary focus:outline-none">
</div>

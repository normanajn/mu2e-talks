{% extends "base.html" %}
{% block title %}Reset Password — Mu2eTalks{% endblock %}

{% block content %}
<div class="max-w-md">
  <div class="mb-4">
    <a href="{% url 'admin-users' %}" class="text-sm text-scd-primary hover:underline">← Users</a>
    <h1 class="text-2xl font-bold text-slate-900 mt-1">Reset Password</h1>
    <p class="text-sm text-slate-500 mt-1">Setting a new password for <strong>{{ target.email }}</strong>.</p>
  </div>

  <div class="bg-white rounded-lg border border-slate-200 shadow-sm px-6 py-5">
    <form method="post" novalidate>
      {% csrf_token %}

      <div class="mb-4">
        <label for="id_new_password1" class="block text-sm font-medium text-slate-700 mb-1">
          New password <span class="text-red-500">*</span>
        </label>
        <input type="password" name="new_password1" id="id_new_password1"
               required autocomplete="new-password"
               class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm
                      focus:border-scd-primary focus:ring-1 focus:ring-scd-primary focus:outline-none">
      </div>

      <div class="mb-6">
        <label for="id_new_password2" class="block text-sm font-medium text-slate-700 mb-1">
          Confirm password <span class="text-red-500">*</span>
        </label>
        <input type="password" name="new_password2" id="id_new_password2"
               required autocomplete="new-password"
               class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm
                      focus:border-scd-primary focus:ring-1 focus:ring-scd-primary focus:outline-none">
      </div>

      <div class="flex items-center gap-3">
        <button type="submit"
                class="bg-scd-primary hover:bg-scd-primary-hover text-white text-sm font-medium px-4 py-2 rounded-md transition-colors">
          Set password
        </button>
        <a href="{% url 'admin-users' %}" class="text-sm text-slate-500 hover:underline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

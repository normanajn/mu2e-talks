{% extends "base.html" %}
{% block title %}Edit User | Mu2eTalks{% endblock %}
{% block content %}
<div class="max-w-3xl">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'admin-users' %}" class="text-sm text-mu2e-primary hover:underline">&larr; Users</a>
    <h1 class="text-2xl font-semibold text-slate-900">Edit User</h1>
  </div>
  <form method="post" class="bg-white border border-slate-200 rounded-lg p-6">
    {% csrf_token %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      {% for field in form %}
        <div{% if field.name == "roster_comments" %} class="md:col-span-2"{% endif %}>
          {% include "components/_form_field.html" %}
        </div>
      {% endfor %}
    </div>
    <div class="flex gap-3 pt-4">
      <button class="bg-mu2e-primary hover:bg-mu2e-primary-hover text-white px-4 py-2 rounded-md text-sm font-medium">Save changes</button>
      <a href="{% url 'admin-users' %}" class="text-sm text-slate-500 self-center hover:underline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}

<div id="primary-group-{{ u.pk }}">
{% if editing %}
  <form hx-post="{% url 'user-primary-group' u.pk %}"
        hx-target="#primary-group-{{ u.pk }}"
        hx-swap="outerHTML">
    {% csrf_token %}
    <select name="group"
            class="w-full rounded border border-slate-300 px-2 py-1 text-xs mb-2
                   focus:border-scd-primary focus:ring-1 focus:ring-scd-primary focus:outline-none">
      <option value="">— No group —</option>
      {% for g in all_groups %}
      <option value="{{ g.pk }}" {% if u.group_id == g.pk %}selected{% endif %}>{{ g.name }}</option>
      {% endfor %}
    </select>
    <div class="flex gap-3">
      <button type="submit"
              class="text-xs font-medium text-scd-primary hover:underline">Save</button>
      <button type="button"
              hx-get="{% url 'user-primary-group' u.pk %}"
              hx-target="#primary-group-{{ u.pk }}"
              hx-swap="outerHTML"
              class="text-xs text-slate-400 hover:text-slate-600">Cancel</button>
    </div>
  </form>
{% else %}
  <span class="text-slate-600">{{ u.group.name|default:"—" }}</span>
  <button type="button"
          hx-get="{% url 'user-primary-group' u.pk %}?edit=1"
          hx-target="#primary-group-{{ u.pk }}"
          hx-swap="outerHTML"
          class="block text-xs text-scd-primary hover:underline mt-0.5">
    Edit
  </button>
{% endif %}
</div>

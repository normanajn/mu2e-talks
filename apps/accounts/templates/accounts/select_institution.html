{% extends "base.html" %}
{% block title %}Select Institution | Mu2eTalks{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto bg-white border border-slate-200 rounded-lg p-6">
  <h1 class="text-2xl font-semibold text-slate-900">Select Institution</h1>
  <p class="text-sm text-slate-500 mt-1">Choose your home institution before continuing.</p>

  <form method="post" class="mt-6 space-y-4">
    {% csrf_token %}
    <label class="block">
      <span class="text-sm font-medium text-slate-700">Institution</span>
      <select name="institution" required class="mt-1 block w-full rounded-md border-slate-300">
        <option value="">Select an institution</option>
        {% for institution in institutions %}
        <option value="{{ institution.pk }}">{{ institution.name }}</option>
        {% endfor %}
      </select>
    </label>
    <div class="flex gap-3">
      <button class="bg-mu2e-primary hover:bg-mu2e-primary-hover text-white px-4 py-2 rounded-md text-sm font-medium">Continue</button>
      <button type="submit" name="institution" value="" formnovalidate class="px-4 py-2 rounded-md text-sm border border-slate-300">Skip for now</button>
    </div>
  </form>
</div>
{% endblock %}
